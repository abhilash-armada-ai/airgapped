---
# Create cert-manager ClusterIssuer for step-ca

- name: ClusterIssuer | Get step-ca root certificate secret
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: step-certificates-certs
    namespace: "{{ step_ca_namespace }}"
  register: step_ca_certs
  until: step_ca_certs.resources | length > 0
  retries: 10
  delay: 5

- name: ClusterIssuer | Create CA bundle secret in cert-manager namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: step-ca-root-cert
        namespace: cert-manager
      type: Opaque
      data:
        ca.crt: "{{ step_ca_certs.resources[0].data['root_ca.crt'] }}"
  no_log: true

- name: ClusterIssuer | Get provisioner key ID
  kubernetes.core.k8s_info:
    api_version: v1
    kind: ConfigMap
    name: step-certificates-config
    namespace: "{{ step_ca_namespace }}"
  register: step_ca_config

- name: ClusterIssuer | Create provisioner secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: step-ca-provisioner
        namespace: cert-manager
      type: Opaque
      stringData:
        password: "{{ step_ca_provisioner_password }}"
  no_log: true

- name: ClusterIssuer | Create step-ca ClusterIssuer
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: step-ca-issuer
      spec:
        acme:
          server: "https://{{ step_ca_host }}/acme/acme/directory"
          skipTLSVerify: true  # Self-signed CA
          privateKeySecretRef:
            name: step-ca-acme-account-key
          solvers:
            - http01:
                ingress:
                  ingressClassName: "{{ step_ca_ingress_class }}"

- name: ClusterIssuer | Verify ClusterIssuer is ready
  kubernetes.core.k8s_info:
    api_version: cert-manager.io/v1
    kind: ClusterIssuer
    name: step-ca-issuer
  register: issuer_status
  until:
    - issuer_status.resources | length > 0
    - issuer_status.resources[0].status.conditions | default([]) | selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list | length > 0
  retries: 30
  delay: 10
  failed_when: false  # May take time for ACME registration

- name: ClusterIssuer | Display status
  ansible.builtin.debug:
    msg: "cert-manager ClusterIssuer 'step-ca-issuer' created. Ready for certificate issuance."
