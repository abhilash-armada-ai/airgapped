---
# Install cert-manager for TLS certificate automation

- name: cert-manager | Check if already installed
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: cert-manager
    namespace: cert-manager
  register: cert_manager_check
  failed_when: false

- name: cert-manager | Skip if already installed
  ansible.builtin.debug:
    msg: "cert-manager is already installed, skipping installation"
  when: cert_manager_check.resources | length > 0

- name: cert-manager | Install when not present
  when: cert_manager_check.resources | length == 0
  block:
    - name: cert-manager | Add Helm repository
      kubernetes.core.helm_repository:
        name: jetstack
        repo_url: "https://charts.jetstack.io"

    - name: cert-manager | Create namespace
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: cert-manager
        state: present

    - name: cert-manager | Deploy with Helm
      kubernetes.core.helm:
        name: cert-manager
        namespace: cert-manager
        chart_ref: jetstack/cert-manager
        chart_version: "{{ step_ca_cert_manager_version }}"
        values:
          installCRDs: true
          replicaCount: 1
          webhook:
            replicaCount: 1
          cainjector:
            replicaCount: 1
        wait: true
        timeout: "10m"
        state: present

    - name: cert-manager | Wait for webhook to be ready
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: cert-manager-webhook
        namespace: cert-manager
      register: webhook_deployment
      until:
        - webhook_deployment.resources | length > 0
        - webhook_deployment.resources[0].status.readyReplicas | default(0) >= 1
      retries: 30
      delay: 10
