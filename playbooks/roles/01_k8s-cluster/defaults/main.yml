---
# Kubernetes cluster installation defaults (kubeadm)

# Kubernetes version
k8s_version: "1.31.0"

# Container runtime (uses OS repository package)
container_runtime: "containerd"

# Network configuration
pod_cidr: "10.244.0.0/16"
service_cidr: "10.96.0.0/12"

# CNI plugin - Cilium
cni_plugin: "cilium"
cilium_version: "1.19.1"
cilium_chart_repo: "https://helm.cilium.io"

# Control plane configuration
control_plane_endpoint: ""  # For HA, set to load balancer VIP

# Kubeadm configuration
kubeadm_token_ttl: "24h0m0s"

# Node requirements
disable_swap: true
load_kernel_modules: true

# Required kernel modules
kernel_modules:
  - overlay
  - br_netfilter

# Required sysctl settings
sysctl_settings:
  net.bridge.bridge-nf-call-iptables: 1
  net.bridge.bridge-nf-call-ip6tables: 1
  net.ipv4.ip_forward: 1

# Package dependencies
k8s_packages:
  - kubelet
  - kubeadm
  - kubectl

# Containerd from OS repos (no version pinning)
containerd_packages:
  - containerd

# APT repository configuration (Kubernetes only)
# NOTE: Version is derived from k8s_version (major.minor)
_k8s_version_short: "{{ k8s_version | regex_replace('^(\\d+\\.\\d+).*', 'v\\1') }}"
k8s_apt_key_url: "https://pkgs.k8s.io/core:/stable:/{{ _k8s_version_short }}/deb/Release.key"
k8s_apt_repo: "https://pkgs.k8s.io/core:/stable:/{{ _k8s_version_short }}/deb/"
