---
# Join additional control plane nodes (for HA)

- name: Join Master | Get join command from first master
  ansible.builtin.set_fact:
    join_cmd: "{{ hostvars['localhost']['kubeadm_join_command'] }}"
    cert_key: "{{ hostvars['localhost']['kubeadm_cert_key'] }}"

- name: Join Master | Join as control plane
  ansible.builtin.command: >
    {{ join_cmd }} --control-plane --certificate-key {{ cert_key }}
  register: join_result
  changed_when: join_result.rc == 0

- name: Join Master | Create .kube directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.kube"
    state: directory
    mode: '0755'

- name: Join Master | Copy admin.conf to .kube/config
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "{{ ansible_env.HOME }}/.kube/config"
    remote_src: true
    mode: '0600'
