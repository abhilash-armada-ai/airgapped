---
# Initialize the first control plane node

- name: Init Master | Set control plane endpoint
  ansible.builtin.set_fact:
    actual_control_plane_endpoint: "{{ control_plane_endpoint | default(ansible_default_ipv4.address, true) }}"

- name: Init Master | Create kubeadm config
  ansible.builtin.template:
    src: kubeadm-config.yaml.j2
    dest: /tmp/kubeadm-config.yaml
    mode: '0600'

- name: Init Master | Initialize cluster with kubeadm (skip CNI)
  ansible.builtin.command: >
    kubeadm init
    --config /tmp/kubeadm-config.yaml
    --upload-certs
    --skip-phases=addon/kube-proxy
  register: kubeadm_init
  changed_when: kubeadm_init.rc == 0

- name: Init Master | Create .kube directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.kube"
    state: directory
    mode: '0755'

- name: Init Master | Copy admin.conf to .kube/config
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "{{ ansible_env.HOME }}/.kube/config"
    remote_src: true
    mode: '0600'

# Install Helm if not present
- name: Init Master | Check if Helm is installed
  ansible.builtin.command: helm version --short
  register: helm_check
  changed_when: false
  failed_when: false

- name: Init Master | Install Helm
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  when: helm_check.rc != 0

# Install Cilium CNI
- name: Init Master | Add Cilium Helm repository
  kubernetes.core.helm_repository:
    name: cilium
    repo_url: "{{ cilium_chart_repo }}"

- name: Init Master | Install Cilium CNI
  kubernetes.core.helm:
    name: cilium
    namespace: kube-system
    chart_ref: cilium/cilium
    chart_version: "{{ cilium_version }}"
    values:
      kubeProxyReplacement: true
      k8sServiceHost: "{{ actual_control_plane_endpoint }}"
      k8sServicePort: 6443
      operator:
        replicas: 1
      ipam:
        mode: kubernetes
      hubble:
        enabled: true
        relay:
          enabled: true
        ui:
          enabled: true
    wait: true
    timeout: "10m"
    state: present
  environment:
    KUBECONFIG: "{{ ansible_env.HOME }}/.kube/config"

- name: Init Master | Wait for Cilium to be ready
  ansible.builtin.command: >
    kubectl wait --for=condition=Ready pods -l app.kubernetes.io/part-of=cilium -n kube-system --timeout=300s
  changed_when: false
  retries: 5
  delay: 30
  register: cilium_ready
  until: cilium_ready.rc == 0

- name: Init Master | Clean up kubeadm config
  ansible.builtin.file:
    path: /tmp/kubeadm-config.yaml
    state: absent

- name: Init Master | Wait for all system pods to be ready
  ansible.builtin.command: >
    kubectl wait --for=condition=Ready pods --all -n kube-system --timeout=300s
  changed_when: false
  retries: 5
  delay: 30
  register: pods_ready
  until: pods_ready.rc == 0
