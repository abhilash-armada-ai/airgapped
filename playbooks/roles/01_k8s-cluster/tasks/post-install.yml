---
# Post-installation tasks

- name: Post Install | Wait for all nodes to be ready
  ansible.builtin.command: >
    kubectl wait --for=condition=Ready nodes --all --timeout=300s
  changed_when: false
  retries: 5
  delay: 30
  register: nodes_ready
  until: nodes_ready.rc == 0

- name: Post Install | Get cluster nodes
  ansible.builtin.command: kubectl get nodes -o wide
  register: cluster_nodes
  changed_when: false

- name: Post Install | Display cluster status
  ansible.builtin.debug:
    msg: |
      ============================================
      Kubernetes Cluster Initialized Successfully!
      ============================================
      {{ cluster_nodes.stdout }}
      ============================================

      To use kubectl on the bastion/local machine:
        mkdir -p ~/.kube
        scp {{ inventory_hostname }}:/etc/kubernetes/admin.conf ~/.kube/config

      Or copy the kubeconfig from:
        /etc/kubernetes/admin.conf
      ============================================

- name: Post Install | Copy kubeconfig to bastion
  ansible.builtin.fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ playbook_dir }}/../kubeconfig"
    flat: true
  changed_when: false
