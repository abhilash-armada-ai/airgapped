---
# Prerequisites for Kubernetes installation

- name: Prerequisites | Disable swap
  ansible.builtin.command: swapoff -a
  when: disable_swap | bool
  changed_when: false

- name: Prerequisites | Remove swap from fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '.*swap.*'
    state: absent
  when: disable_swap | bool

- name: Prerequisites | Load required kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ kernel_modules }}"
  when: load_kernel_modules | bool

- name: Prerequisites | Ensure kernel modules load on boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      {% for module in kernel_modules %}
      {{ module }}
      {% endfor %}
    mode: '0644'
  when: load_kernel_modules | bool

- name: Prerequisites | Configure sysctl settings
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/k8s.conf
    reload: true
  loop: "{{ sysctl_settings | dict2items }}"

- name: Prerequisites | Install common utilities
  ansible.builtin.apt:
    name:
      # Common tools
      - git
      - vim
      - jq
      - zip
      - unzip
      - lsof
      - htop
      - wget
      - tree
      - net-tools
      - dnsutils
      - bash-completion
      # Kubernetes requirements
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - socat
      - conntrack
      - ipset
      - ebtables
      - ipvsadm
      # Build tools (for some drivers)
      - build-essential
      - python3
      - python3-pip
    state: present
    update_cache: true
