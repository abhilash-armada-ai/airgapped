---
# Air-Gap Infrastructure Inventory
# ================================
#
# This inventory supports two deployment modes:
# 1. Full deployment (K8s cluster + infrastructure)
# 2. Infrastructure-only (requires existing K8s cluster)
#
# For K8s cluster installation, configure masters and workers in group_vars/all.yml
# The site.yml will dynamically add hosts from those configurations

all:
  children:
    # Bastion host - runs Ansible and has kubectl access
    bastion:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"

    # K8s master nodes - populated dynamically from group_vars/all.yml
    # Or define static hosts below
    masters:
      hosts: {}
      # Example static definition:
      # master-1:
      #   ansible_host: 192.168.1.10
      #   ansible_user: ubuntu
      #   ansible_ssh_private_key_file: ~/.ssh/id_rsa

    # K8s worker nodes - populated dynamically from group_vars/all.yml
    # Or define static hosts below
    workers:
      hosts: {}
      # Example static definition:
      # worker-1:
      #   ansible_host: 192.168.1.20
      #   ansible_user: ubuntu
      #   ansible_ssh_private_key_file: ~/.ssh/id_rsa

# Alternative: Remote bastion host with kubectl access
# bastion:
#   hosts:
#     bastion.example.com:
#       ansible_user: ubuntu
#       ansible_ssh_private_key_file: ~/.ssh/id_rsa
#       ansible_python_interpreter: /usr/bin/python3
